name: Render Video

on:
  push:
    branches: [master]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Create video with text
        run: |
          ffmpeg -f lavfi -i color=c=#1a1a2e:s=1280x720:d=5 -vf "drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='Idan':fontcolor=#8F67F5:fontsize=120:x=(w-text_w)/2:y=(h-text_h)/2" -c:v libx264 -pix_fmt yuv420p -y out.mp4
        
      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: idan-logo-video
          path: out.mp4
