name: Render Video

on:
  push:
    branches: [master]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install FFmpeg
        uses: actions/cache@v3
        with:
          path: /usr/bin/ffmpeg
          key: ffmpeg-${{ runner.os }}
          
      - name: Install dependencies
        run: npm install
        
      - name: Build video
        run: npx @remotion/cli render src/index.tsx out.mp4 --codec h264
        
      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: idan-logo-video
          path: out.mp4
